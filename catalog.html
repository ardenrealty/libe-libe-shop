<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Каталог — Libe Libe Jewel</title>
  <!-- Шрифты Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  <!-- Telegram Mini App SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <!-- Наши стили из Этапа 2 -->
  <link rel="stylesheet" href="css/styles.css">

  <style>
    /* ── Стили специфичные для каталога ── */

    /* Фильтры категорий */
    .filters {
      padding: var(--space-3) 0;
      background: var(--color-bg);
      position: sticky;
      top: 56px; /* прилипает под шапкой */
      z-index: 50;
      border-bottom: 1px solid var(--color-border);
    }

    .filters__scroll {
      display: flex;
      gap: var(--space-2);
      overflow-x: auto;
      padding: var(--space-2) var(--space-4);
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .filters__scroll::-webkit-scrollbar { display: none; }

    /* Кнопка-таблетка фильтра */
    .filter-btn {
      flex-shrink: 0;
      padding: 8px 16px;
      background: transparent;
      color: var(--color-gold);
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.04em;
      border: 1.5px solid rgba(201, 168, 76, 0.4);
      border-radius: var(--radius-pill);
      cursor: pointer;
      transition: var(--transition);
      white-space: nowrap;
    }

    /* Активный фильтр — бордовый */
    .filter-btn.active {
      background: var(--color-burgundy);
      color: var(--color-text);
      border-color: var(--color-burgundy);
    }

    .filter-btn:active {
      transform: scale(0.96);
    }

    /* Основной контент */
    .catalog-content {
      padding: var(--space-4);
    }

    /* Карточка товара — недоступный товар */
    .product-card.out-of-stock .product-card__image {
      filter: grayscale(80%) opacity(0.6);
    }

    .out-of-stock-label {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.7);
      color: var(--color-text-muted);
      font-size: 11px;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      white-space: nowrap;
      pointer-events: none;
    }

    /* Заблокированная кнопка */
    .btn-small:disabled {
      background: var(--color-surface-2);
      color: var(--color-text-muted);
      box-shadow: none;
      cursor: not-allowed;
      opacity: 0.6;
    }

    /* Бейдж категории на карточке */
    .badge-category {
      display: inline-block;
      padding: 2px 7px;
      background: rgba(123, 27, 78, 0.6);
      color: var(--color-text);
      font-family: var(--font-body);
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.04em;
      border-radius: var(--radius-sm);
    }

    /* Пустой результат */
    .empty-state {
      text-align: center;
      padding: var(--space-6) var(--space-4);
      color: var(--color-text-muted);
      font-size: 14px;
      line-height: 1.8;
    }

    .empty-state__icon {
      font-size: 40px;
      display: block;
      margin-bottom: var(--space-3);
    }

    /* Лоадер */
    .loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-6) 0;
      color: var(--color-text-muted);
      font-size: 13px;
    }

    .loader__icon {
      font-size: 36px;
      animation: heartbeat 1.5s ease infinite;
    }

    /* Уведомление */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--color-burgundy);
      color: var(--color-text);
      font-size: 13px;
      padding: 10px 20px;
      border-radius: var(--radius-pill);
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 200;
      white-space: nowrap;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

  <!-- ════════════════════════════
       ШАПКА
       ════════════════════════════ -->
  <header class="header">

    <!-- Кнопка "назад" слева -->
    <button class="header__back" onclick="goBack()">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>

    <!-- Заголовок по центру -->
    <div class="header__logo">
      <div style="font-size:16px; letter-spacing:0.1em;">Каталог</div>
    </div>

    <!-- Иконка корзины справа -->
    <button onclick="goToCart()" style="position:absolute; right:16px; display:flex; align-items:center; justify-content:center; width:40px; height:40px; position:absolute; right:16px;">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
           fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
        <line x1="3" y1="6" x2="21" y2="6"/>
        <path d="M16 10a4 4 0 0 1-8 0"/>
      </svg>
      <span class="header__cart-badge" id="cart-badge" style="display:none;">0</span>
    </button>

  </header>


  <!-- ════════════════════════════
       ФИЛЬТРЫ КАТЕГОРИЙ
       ════════════════════════════ -->
  <div class="filters">
    <div class="filters__scroll">

      <button class="filter-btn" data-category="Все" onclick="setFilter('Все', this)">
        Все 💎
      </button>

      <button class="filter-btn" data-category="Серьги" onclick="setFilter('Серьги', this)">
        Серьги 💫
      </button>

      <button class="filter-btn" data-category="Чокеры" onclick="setFilter('Чокеры', this)">
        Чокеры 🖤
      </button>

      <button class="filter-btn" data-category="Колье" onclick="setFilter('Колье', this)">
        Колье 💎
      </button>

    </div>
  </div>


  <!-- ════════════════════════════
       СЕТКА ТОВАРОВ
       ════════════════════════════ -->
  <div class="catalog-content">

    <!-- Сюда JS вставляет карточки -->
    <div id="products-grid">
      <!-- Лоадер — виден пока грузятся товары -->
      <div class="loader" id="loader">
        <span class="loader__icon">💎</span>
        <span>Загружаем украшения...</span>
      </div>
    </div>

  </div>


  <!-- ════════════════════════════
       НИЖНЯЯ НАВИГАЦИЯ
       ════════════════════════════ -->
  <nav class="tab-bar">

    <button class="tab-bar__item" onclick="goHome()">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span>Главная</span>
    </button>

    <!-- Каталог — активная вкладка -->
    <button class="tab-bar__item active">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10"/>
        <circle cx="12" cy="12" r="4"/>
        <line x1="4.93" y1="4.93" x2="9.17" y2="9.17"/>
        <line x1="14.83" y1="14.83" x2="19.07" y2="19.07"/>
        <line x1="14.83" y1="9.17" x2="19.07" y2="4.93"/>
        <line x1="4.93" y1="19.07" x2="9.17" y2="14.83"/>
      </svg>
      <span>Каталог</span>
    </button>

    <button class="tab-bar__item" onclick="goToCart()" style="position:relative;">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
        <line x1="3" y1="6" x2="21" y2="6"/>
        <path d="M16 10a4 4 0 0 1-8 0"/>
      </svg>
      <span class="tab-bar__badge" id="tab-cart-badge" style="display:none;">0</span>
      <span>Корзина</span>
    </button>

    <button class="tab-bar__item" onclick="goToOrders()">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
      </svg>
      <span>Заказы</span>
    </button>

  </nav>


  <!-- Уведомление "Добавлено в корзину" -->
  <div class="toast" id="toast">✓ Добавлено в корзину</div>


  <!-- ════════════════════════════
       JAVASCRIPT
       ════════════════════════════ -->
  <script>

    // ──────────────────────────────────────────
    // A. ИНИЦИАЛИЗАЦИЯ
    // ──────────────────────────────────────────

    // Инициализируем Telegram Mini App
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
    }

    // Ссылка на таблицу Google Sheets (CSV)
    const SHEETS_URL = "https://docs.google.com/spreadsheets/d/1ImOZXFUQoYpPEAbu5CfwCOvvs8TsoyBE_GbmbFim188/export?format=csv&gid=0";

    // Заглушка для товаров без фото
    const PLACEHOLDER_IMG = "https://placehold.co/400x400/1A1A1A/C9A84C?text=💎";

    // Загружаем корзину из localStorage
    let cart = JSON.parse(localStorage.getItem('libe_cart') || '[]');

    // Все загруженные товары (сохраняем для фильтрации)
    let allProducts = [];

    // Текущий активный фильтр
    let activeFilter = 'Все';

    // Проверяем — пришли ли с главной с выбранной категорией
    const savedCategory = localStorage.getItem('libe_category');
    console.log('Сохранённая категория:', savedCategory);
    if (savedCategory) {
      activeFilter = savedCategory;
      localStorage.removeItem('libe_category'); // Очищаем после использования
    }

    // Обновляем бейджи корзины
    updateCartBadge();

    // Сразу активируем кнопку фильтра — не ждём загрузки товаров
    activateFilterButton(activeFilter);

    // Загружаем товары
    loadProducts();


    // ──────────────────────────────────────────
    // B. ЗАГРУЗКА ТОВАРОВ ИЗ GOOGLE SHEETS
    // ──────────────────────────────────────────

    async function loadProducts() {
      try {
        console.log('Начинаем загрузку товаров...');
        const response = await fetch(SHEETS_URL, {
          method: 'GET',
          mode: 'cors',
        });

        if (!response.ok) throw new Error('Ошибка ответа: ' + response.status);

        const csv = await response.text();
        console.log('CSV получен:', csv.slice(0, 300));

        // Полный парсер — правильно читает переносы строк внутри кавычек
        allProducts = parseCSVFull(csv);
        console.log('Товаров найдено:', allProducts.length);

        console.log('Товары загружены:', allProducts);
        // Отладка: показываем поле в_наличии для каждого товара
        allProducts.forEach(p => {
          console.log(`"${p.название}" → в_наличии: [${p.в_наличии}] (${p.в_наличии?.length} символов)`);
        });

        // Рисуем товары с учётом активного фильтра
        renderProducts(filterProducts(activeFilter));

        // Активируем нужную кнопку фильтра
        activateFilterButton(activeFilter);

      } catch (error) {
        console.error('Ошибка загрузки:', error);
        showError();
      }
    }

    // Полный CSV парсер — читает весь текст целиком,
    // правильно обрабатывает переносы строк внутри кавычек
    function parseCSVFull(csvText) {
      const records = [];
      let currentRecord = [];
      let currentField  = '';
      let inQuotes      = false;
      let isFirstRow    = true;
      let i = 0;

      while (i < csvText.length) {
        const char = csvText[i];

        if (inQuotes) {
          if (char === '"' && csvText[i + 1] === '"') {
            currentField += '"'; // экранированная кавычка ""
            i += 2;
            continue;
          } else if (char === '"') {
            inQuotes = false; // конец quoted-поля
          } else {
            currentField += char; // любой символ внутри кавычек (в т.ч. \n)
          }
        } else {
          if (char === '"') {
            inQuotes = true;
          } else if (char === ',') {
            currentRecord.push(currentField.trim());
            currentField = '';
          } else if (char === '\r') {
            i++; continue; // пропускаем \r
          } else if (char === '\n') {
            currentRecord.push(currentField.trim());
            currentField = '';
            if (!isFirstRow && currentRecord.some(f => f !== '')) {
              records.push(currentRecord);
            }
            isFirstRow    = false;
            currentRecord = [];
          } else {
            currentField += char;
          }
        }
        i++;
      }

      // Последняя запись (если файл без \n в конце)
      if (currentRecord.length > 0 || currentField) {
        currentRecord.push(currentField.trim());
        if (!isFirstRow && currentRecord.some(f => f !== '')) {
          records.push(currentRecord);
        }
      }

      return records.map(cols => ({
        id:          cols[0] || '',
        название:    cols[1] || '',
        категория:   cols[2] || '',
        цена:        cols[3] || '',
        описание:    cols[4] || '',
        камень:      cols[5] || '',
        фото_ссылка: cols[6] || '',
        в_наличии:   cols[7] || ''
      }));
    }

    // (старый построчный парсер — оставлен для parseCSVLine ниже)
    function parseCSV(csvText) {
      const lines = csvText.trim().split('\n');
      const products = [];

      for (let i = 1; i < lines.length; i++) {
        const line = lines[i].trim();
        if (!line) continue;

        const cols = parseCSVLine(line);

        products.push({
          id:          cols[0] || '',
          название:    cols[1] || '',
          категория:   cols[2] || '',
          цена:        cols[3] || '',
          описание:    cols[4] || '',
          камень:      cols[5] || '',
          фото_ссылка: cols[6] || '',
          в_наличии:   cols[7] || ''
        });
      }

      return products;
    }

    // Умный разбор строки CSV (учитывает кавычки)
    function parseCSVLine(line) {
      const result = [];
      let current = '';
      let inQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        if (char === '"') {
          inQuotes = !inQuotes;
        } else if (char === ',' && !inQuotes) {
          result.push(current.trim());
          current = '';
        } else {
          current += char;
        }
      }

      result.push(current.trim());
      return result;
    }


    // ──────────────────────────────────────────
    // C. ФИЛЬТРАЦИЯ И ОТРИСОВКА
    // ──────────────────────────────────────────

    // Установить фильтр при клике на кнопку
    function setFilter(category, buttonEl) {
      activeFilter = category;

      // Убираем активный класс со всех кнопок
      document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));

      // Добавляем активный класс нажатой кнопке
      buttonEl.classList.add('active');

      // Перерисовываем карточки
      renderProducts(filterProducts(category));
    }

    // Отфильтровать товары по категории
    function filterProducts(category) {
      if (category === 'Все') {
        return allProducts.filter(p => p.в_наличии?.toLowerCase() === 'да');
      }
      return allProducts.filter(p =>
        p.категория === category
        // Показываем все товары категории, включая "нет в наличии"
      );
    }

    // Активировать кнопку фильтра программно
    function activateFilterButton(category) {
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.remove('active');
        if (btn.dataset.category === category) {
          btn.classList.add('active');
        }
      });
    }

    // Нарисовать карточки товаров
    function renderProducts(products) {
      const grid = document.getElementById('products-grid');

      if (products.length === 0) {
        grid.innerHTML = `
          <div class="empty-state">
            <span class="empty-state__icon">💎</span>
            В этой категории пока нет украшений
          </div>
        `;
        return;
      }

      let html = '<div class="grid-2">';

      products.forEach((product, index) => {
        const imgSrc    = product.фото_ссылка || PLACEHOLDER_IMG;
        const inStock   = product.в_наличии?.toLowerCase() === 'да';
        const delay     = Math.min(index + 1, 4); // анимация delay-1..4
        const stockClass = inStock ? '' : 'out-of-stock';

        html += `
          <div class="product-card-wrapper">

            <!-- Бейдж категории -->
            <div class="product-card__badges">
              <span class="badge-category">${product.категория}</span>
            </div>

            <div
              class="product-card ${stockClass} animate-fade-in delay-${delay}"
              onclick="openProduct('${product.id}')"
            >
              <!-- Фото товара -->
              <div style="position:relative;">
                <img
                  class="product-card__image"
                  src="${imgSrc}"
                  alt="${product.название}"
                  onerror="this.src='${PLACEHOLDER_IMG}'"
                >
                <!-- Надпись "Нет в наличии" поверх фото -->
                ${!inStock ? `<div class="out-of-stock-label">Нет в наличии</div>` : ''}
              </div>

              <!-- Информация о товаре -->
              <div class="product-card__body">

                <div class="product-card__name">${product.название}</div>

                ${product.камень ? `<div class="product-card__stone">✦ ${product.камень}</div>` : ''}

                <div class="product-card__price">${formatPrice(product.цена)}</div>

                <button
                  class="btn-small w-full"
                  ${!inStock ? 'disabled' : ''}
                  onclick="addToCart(event, ${JSON.stringify(product).replace(/"/g, '&quot;')})"
                >
                  ${inStock ? 'В корзину' : 'Нет в наличии'}
                </button>

              </div>
            </div>
          </div>
        `;
      });

      html += '</div>';
      grid.innerHTML = html;
    }

    // Показываем сообщение об ошибке загрузки
    function showError() {
      document.getElementById('products-grid').innerHTML = `
        <div class="empty-state">
          <span class="empty-state__icon">😔</span>
          Не удалось загрузить товары.<br>Попробуйте позже.
        </div>
      `;
    }

    // Форматируем цену: "1500" → "1 500 ₽"
    function formatPrice(price) {
      const num = parseInt(price);
      if (isNaN(num)) return price;
      return num.toLocaleString('ru-RU') + ' ₽';
    }


    // ──────────────────────────────────────────
    // D. КОРЗИНА
    // ──────────────────────────────────────────

    function addToCart(event, product) {
      event.stopPropagation(); // Не открываем карточку товара

      const existingIndex = cart.findIndex(item => item.id === product.id);

      if (existingIndex >= 0) {
        cart[existingIndex].quantity = (cart[existingIndex].quantity || 1) + 1;
      } else {
        cart.push({ ...product, quantity: 1 });
      }

      localStorage.setItem('libe_cart', JSON.stringify(cart));
      updateCartBadge();
      showToast('✓ Добавлено в корзину');
    }

    function updateCartBadge() {
      const totalItems = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);

      const headerBadge = document.getElementById('cart-badge');
      const tabBadge    = document.getElementById('tab-cart-badge');

      if (totalItems > 0) {
        headerBadge.textContent = totalItems;
        headerBadge.style.display = 'flex';
        tabBadge.textContent = totalItems;
        tabBadge.style.display = 'flex';
      } else {
        headerBadge.style.display = 'none';
        tabBadge.style.display = 'none';
      }
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }


    // ──────────────────────────────────────────
    // E. НАВИГАЦИЯ
    // ──────────────────────────────────────────

    function goBack()     { window.location.href = 'index.html'; }
    function goHome()     { window.location.href = 'index.html'; }
    function goToCart()   { window.location.href = 'cart.html'; }
    function goToOrders() { window.location.href = 'orders.html'; }

    function openProduct(productId) {
      window.location.href = `product.html?id=${productId}`;
    }

  </script>

</body>
</html>

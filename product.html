<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Украшение — Libe Libe Jewel</title>
  <!-- Шрифты Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  <!-- Telegram Mini App SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <!-- Наши стили из Этапа 2 -->
  <link rel="stylesheet" href="styles.css">

  <style>
    /* ── Стили специфичные для страницы товара ── */

    /* Отступ снизу увеличен под фиксированные кнопки */
    body {
      padding-bottom: 210px;
    }

    /* Большое фото товара */
    .product-photo {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      background: var(--color-surface);
      display: block;
    }

    /* Заглушка если нет фото */
    .product-photo-placeholder {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: var(--color-surface);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 64px;
    }

    /* Блок с информацией о товаре */
    .product-info {
      padding: var(--space-4);
    }

    /* Бейдж категории */
    .product-category-badge {
      display: inline-block;
      padding: 3px 10px;
      background: rgba(123, 27, 78, 0.6);
      color: var(--color-text);
      font-family: var(--font-body);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.06em;
      border-radius: var(--radius-sm);
      margin-bottom: var(--space-3);
    }

    /* Название товара */
    .product-name {
      font-family: var(--font-heading);
      font-size: 30px;
      font-weight: 700;
      color: var(--color-text);
      line-height: 1.2;
      margin-bottom: var(--space-3);
    }

    /* Тег камня */
    .product-stone {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      background: var(--color-surface-2);
      color: var(--color-gold);
      font-family: var(--font-body);
      font-size: 13px;
      border: 1px solid rgba(201, 168, 76, 0.4);
      border-radius: var(--radius-pill);
      margin-bottom: var(--space-4);
    }

    /* Цена */
    .product-price {
      font-family: var(--font-body);
      font-size: 28px;
      font-weight: 600;
      color: var(--color-gold);
      margin-bottom: var(--space-4);
    }

    /* Блок описания */
    .product-description {
      padding: 0 var(--space-4) var(--space-4);
    }

    .product-description__label {
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 500;
      color: var(--color-text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: var(--space-2);
    }

    .product-description__text {
      font-family: var(--font-body);
      font-size: 14px;
      color: var(--color-text-muted);
      line-height: 1.8;
    }

    /* Блок энергетики камня */
    .stone-energy {
      margin: 0 var(--space-4) var(--space-4);
      padding: var(--space-4);
      background: var(--color-surface);
      border: 1px solid rgba(201, 168, 76, 0.3);
      border-radius: var(--radius-md);
    }

    .stone-energy__title {
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 500;
      color: var(--color-gold);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: var(--space-3);
    }

    .stone-energy__text {
      font-family: var(--font-heading);
      font-size: 17px;
      color: var(--color-text);
      line-height: 1.7;
      font-style: italic;
    }

    /* Фиксированные кнопки снизу */
    .bottom-panel {
      position: fixed;
      bottom: 64px; /* над нижней навигацией */
      left: 0;
      right: 0;
      padding: var(--space-3) var(--space-4);
      background: rgba(15, 15, 15, 0.97);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-top: 1px solid var(--color-border);
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
      z-index: 90;
    }

    /* Лоадер */
    .loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--space-3);
      min-height: 60vh;
      color: var(--color-text-muted);
      font-size: 13px;
    }

    .loader__icon {
      font-size: 40px;
      animation: heartbeat 1.5s ease infinite;
    }

    /* Страница "товар не найден" */
    .not-found {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--space-4);
      min-height: 60vh;
      padding: var(--space-5);
      text-align: center;
    }

    .not-found__icon {
      font-size: 48px;
    }

    .not-found__text {
      color: var(--color-text-muted);
      font-size: 15px;
      line-height: 1.7;
    }
  </style>
</head>
<body>

  <!-- ════════════════════════════
       ШАПКА
       ════════════════════════════ -->
  <header class="header">

    <!-- Кнопка "назад" слева -->
    <button class="header__back" onclick="goBack()">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>

    <!-- Заголовок по центру -->
    <div class="header__logo">
      <div style="font-size:16px; letter-spacing:0.1em;">Украшение</div>
    </div>

    <!-- Иконка корзины справа -->
    <button onclick="goToCart()" style="position:absolute; right:16px; display:flex; align-items:center; justify-content:center; width:40px; height:40px;">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
           fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
        <line x1="3" y1="6" x2="21" y2="6"/>
        <path d="M16 10a4 4 0 0 1-8 0"/>
      </svg>
      <span class="header__cart-badge" id="cart-badge" style="display:none;">0</span>
    </button>

  </header>


  <!-- ════════════════════════════
       ОСНОВНОЙ КОНТЕНТ
       (JS заполняет этот блок)
       ════════════════════════════ -->
  <div id="page-content">

    <!-- Лоадер — виден пока загружается товар -->
    <div class="loader" id="loader">
      <span class="loader__icon">💎</span>
      <span>Загружаем украшение...</span>
    </div>

  </div>


  <!-- ════════════════════════════
       ФИКСИРОВАННЫЕ КНОПКИ СНИЗУ
       (JS показывает/скрывает)
       ════════════════════════════ -->
  <div class="bottom-panel" id="bottom-panel" style="display:none;">
    <button class="btn-primary" id="btn-add-to-cart" onclick="addToCart()">
      В корзину
    </button>
    <button class="btn-secondary" onclick="shareProduct()">
      Поделиться 💫
    </button>
  </div>


  <!-- ════════════════════════════
       НИЖНЯЯ НАВИГАЦИЯ
       ════════════════════════════ -->
  <nav class="tab-bar">

    <button class="tab-bar__item" onclick="goHome()">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span>Главная</span>
    </button>

    <button class="tab-bar__item" onclick="goToCatalog()">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10"/>
        <circle cx="12" cy="12" r="4"/>
        <line x1="4.93" y1="4.93" x2="9.17" y2="9.17"/>
        <line x1="14.83" y1="14.83" x2="19.07" y2="19.07"/>
        <line x1="14.83" y1="9.17" x2="19.07" y2="4.93"/>
        <line x1="4.93" y1="19.07" x2="9.17" y2="14.83"/>
      </svg>
      <span>Каталог</span>
    </button>

    <button class="tab-bar__item" onclick="goToCart()" style="position:relative;">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
        <line x1="3" y1="6" x2="21" y2="6"/>
        <path d="M16 10a4 4 0 0 1-8 0"/>
      </svg>
      <span class="tab-bar__badge" id="tab-cart-badge" style="display:none;">0</span>
      <span>Корзина</span>
    </button>

    <button class="tab-bar__item" onclick="goToOrders()">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
      </svg>
      <span>Заказы</span>
    </button>

  </nav>


  <!-- ════════════════════════════
       JAVASCRIPT
       ════════════════════════════ -->
  <script>

    // ──────────────────────────────────────────
    // A. ИНИЦИАЛИЗАЦИЯ
    // ──────────────────────────────────────────

    // Инициализируем Telegram Mini App
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
    }

    // Ссылка на Google Sheets (CSV)
    const SHEETS_URL = "https://docs.google.com/spreadsheets/d/1ImOZXFUQoYpPEAbu5CfwCOvvs8TsoyBE_GbmbFim188/export?format=csv&gid=0";

    // Заглушка для фото
    const PLACEHOLDER_IMG = "https://placehold.co/480x480/1A1A1A/C9A84C?text=💎";

    // Читаем id товара из URL: product.html?id=5
    const params    = new URLSearchParams(window.location.search);
    const productId = params.get('id');
    console.log('ID из URL:', productId);

    // Текущий товар (заполнится после загрузки)
    let currentProduct = null;

    // Корзина из localStorage
    let cart = JSON.parse(localStorage.getItem('libe_cart') || '[]');

    // Обновляем бейджи
    updateCartBadge();

    // Загружаем товары
    loadProduct();


    // ──────────────────────────────────────────
    // B. ЗАГРУЗКА ТОВАРА
    // ──────────────────────────────────────────

    async function loadProduct() {
      // Если нет id в URL — сразу показываем "не найдено"
      if (!productId) {
        showNotFound();
        return;
      }

      try {
        const response = await fetch(SHEETS_URL);
        console.log('Статус ответа:', response.status, response.ok);
        if (!response.ok) throw new Error('Ошибка сети');

        const csvText = await response.text();
        console.log('CSV загружен, первые 200 символов:', csvText.slice(0, 200));

        const products = parseCSV(csvText);
        console.log('Товаров найдено:', products.length);
        console.log('Ищем id:', productId);
        console.log('ID первых 3 товаров:', products.slice(0, 3).map(p => p.id));

        // Ищем товар по id
        const product = products.find(p => p.id === productId);

        if (!product) {
          showNotFound();
          return;
        }

        // Сохраняем и рисуем страницу
        currentProduct = product;
        renderProduct(product);

      } catch (error) {
        console.log('Ошибка загрузки:', error.message);
        showNotFound('Не удалось загрузить товар. Попробуйте позже.');
      }
    }

    // Полный CSV парсер — читает весь текст целиком,
    // правильно обрабатывает переносы строк внутри кавычек
    function parseCSV(csvText) {
      const records = [];
      let currentRecord = [];
      let currentField  = '';
      let inQuotes      = false;
      let isFirstRow    = true;
      let i = 0;

      while (i < csvText.length) {
        const char = csvText[i];

        if (inQuotes) {
          if (char === '"' && csvText[i + 1] === '"') {
            currentField += '"'; // экранированная кавычка ""
            i += 2;
            continue;
          } else if (char === '"') {
            inQuotes = false;
          } else {
            currentField += char; // любой символ внутри кавычек (в т.ч. \n)
          }
        } else {
          if (char === '"') {
            inQuotes = true;
          } else if (char === ',') {
            currentRecord.push(currentField.trim());
            currentField = '';
          } else if (char === '\r') {
            i++; continue;
          } else if (char === '\n') {
            currentRecord.push(currentField.trim());
            currentField = '';
            if (!isFirstRow && currentRecord.some(f => f !== '')) {
              records.push(currentRecord);
            }
            isFirstRow    = false;
            currentRecord = [];
          } else {
            currentField += char;
          }
        }
        i++;
      }

      // Последняя запись
      if (currentRecord.length > 0 || currentField) {
        currentRecord.push(currentField.trim());
        if (!isFirstRow && currentRecord.some(f => f !== '')) {
          records.push(currentRecord);
        }
      }

      return records.map(cols => ({
        id:          cols[0] || '',
        название:    cols[1] || '',
        категория:   cols[2] || '',
        цена:        cols[3] || '',
        описание:    cols[4] || '',
        камень:      cols[5] || '',
        фото_ссылка: cols[6] || '',
        в_наличии:   cols[7] || ''
      }));
    }

    // Умный разбор строки CSV (учитывает кавычки)
    function parseCSVLine(line) {
      const result = [];
      let current = '';
      let inQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        if (char === '"') {
          inQuotes = !inQuotes;
        } else if (char === ',' && !inQuotes) {
          result.push(current.trim());
          current = '';
        } else {
          current += char;
        }
      }

      result.push(current.trim());
      return result;
    }


    // ──────────────────────────────────────────
    // C. ОТРИСОВКА СТРАНИЦЫ ТОВАРА
    // ──────────────────────────────────────────

    function renderProduct(product) {
      const inStock  = product.в_наличии?.toLowerCase() === 'да';
      const imgSrc   = product.фото_ссылка || PLACEHOLDER_IMG;
      const energy   = getStoneEnergy(product.камень);

      // Блок описания — скрываем если нет текста
      const descriptionBlock = product.описание ? `
        <div class="product-description animate-fade-in">
          <p class="product-description__label">Об украшении</p>
          <p class="product-description__text">${product.описание}</p>
        </div>
        <div class="divider" style="margin: 0 16px;"></div>
      ` : '';

      // Блок энергетики камня
      const energyBlock = product.камень ? `
        <div class="stone-energy animate-fade-in">
          <p class="stone-energy__title">✨ Энергетика камня</p>
          <p class="stone-energy__text">
            ${energy || product.камень}
          </p>
        </div>
      ` : '';

      // Собираем HTML страницы
      const html = `
        <!-- Большое фото -->
        <img
          class="product-photo animate-fade-in"
          src="${imgSrc}"
          alt="${product.название}"
          onerror="this.src='${PLACEHOLDER_IMG}'"
        >

        <!-- Информация о товаре -->
        <div class="product-info animate-fade-in">

          <!-- Бейдж категории -->
          <span class="product-category-badge">${product.категория}</span>

          <!-- Название -->
          <h1 class="product-name">${product.название}</h1>

          <!-- Тег камня -->
          ${product.камень ? `
            <div class="product-stone">
              🔮 ${product.камень}
            </div>
          ` : ''}

          <!-- Цена -->
          <div class="product-price">${formatPrice(product.цена)}</div>

          <!-- Разделитель -->
          <div class="divider" style="margin: 0;"></div>

        </div>

        <!-- Описание -->
        ${descriptionBlock}

        <!-- Энергетика камня -->
        ${energyBlock}
      `;

      document.getElementById('page-content').innerHTML = html;

      // Показываем панель с кнопками
      const panel  = document.getElementById('bottom-panel');
      const btnAdd = document.getElementById('btn-add-to-cart');

      panel.style.display = 'flex';

      // Если нет в наличии — блокируем кнопку
      if (!inStock) {
        btnAdd.textContent = 'Нет в наличии';
        btnAdd.disabled    = true;
        btnAdd.style.background = 'var(--color-surface-2)';
        btnAdd.style.color      = 'var(--color-text-muted)';
        btnAdd.style.boxShadow  = 'none';
      }
    }

    // Показать страницу "товар не найден"
    function showNotFound(msg) {
      document.getElementById('page-content').innerHTML = `
        <div class="not-found">
          <span class="not-found__icon">💎</span>
          <p class="not-found__text">
            ${msg || 'Украшение не найдено'}
          </p>
          <button class="btn-primary" style="min-width:200px;" onclick="goToCatalog()">
            Вернуться в каталог
          </button>
        </div>
      `;
    }

    // Форматируем цену: "1500" → "1 500 ₽"
    function formatPrice(price) {
      const num = parseInt(price);
      if (isNaN(num)) return price;
      return num.toLocaleString('ru-RU') + ' ₽';
    }


    // ──────────────────────────────────────────
    // D. СЛОВАРЬ ЭНЕРГЕТИКИ КАМНЕЙ
    // ──────────────────────────────────────────

    function getStoneEnergy(stoneName) {
      if (!stoneName) return null;

      // Приводим к нижнему регистру для сравнения
      const name = stoneName.toLowerCase().trim();

      const energyMap = {
        'гематит':         'Защита, сила, заземление. Камень воинов и лидеров.',
        'розовый кварц':   'Любовь, нежность, гармония. Открывает сердечную чакру.',
        'жемчуг':          'Чистота, мудрость, женственность. Усиливает интуицию.',
        'лунный камень':   'Интуиция, магия, цикличность. Камень новых начинаний.',
        'аметист':         'Спокойствие, духовность, защита. Очищает энергетику.',
        'малахит':         'Трансформация, рост, удача. Камень перемен к лучшему.',
        'лазурит':         'Мудрость, истина, интуиция. Открывает третий глаз.',
        'тигровый глаз':   'Уверенность, решительность, удача. Притягивает успех.',
        'обсидиан':        'Защита, очищение, правда. Отражает негативную энергию.',
        'лабрадорит':      'Магия, трансформация, интуиция. Камень волшебников.',
        'бирюза':          'Общение, творчество, удача. Приносит гармонию и радость.',
        'гранат':          'Страсть, энергия, преданность. Усиливает жизненные силы.',
        'цитрин':          'Радость, изобилие, позитив. Камень солнца и удачи.',
      };

      // Ищем точное совпадение
      if (energyMap[name]) return energyMap[name];

      // Ищем частичное совпадение (например "розовый кварц матовый")
      for (const key of Object.keys(energyMap)) {
        if (name.includes(key) || key.includes(name)) {
          return energyMap[key];
        }
      }

      return null; // Камень не найден в словаре — покажем просто название
    }


    // ──────────────────────────────────────────
    // E. КОРЗИНА
    // ──────────────────────────────────────────

    function addToCart() {
      if (!currentProduct) return;

      const existingIndex = cart.findIndex(item => item.id === currentProduct.id);

      if (existingIndex >= 0) {
        cart[existingIndex].quantity = (cart[existingIndex].quantity || 1) + 1;
      } else {
        cart.push({ ...currentProduct, quantity: 1 });
      }

      localStorage.setItem('libe_cart', JSON.stringify(cart));
      updateCartBadge();

      // Анимация кнопки: меняем текст на "✓ Добавлено!"
      const btn = document.getElementById('btn-add-to-cart');
      btn.textContent = '✓ Добавлено!';
      btn.style.background = 'linear-gradient(135deg, #2d5a27, #3d7a35)'; // зелёный

      // Через 1.5 секунды переходим в каталог
      setTimeout(() => {
        window.location.href = 'catalog.html';
      }, 1500);
    }

    function updateCartBadge() {
      const totalItems = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);

      const headerBadge = document.getElementById('cart-badge');
      const tabBadge    = document.getElementById('tab-cart-badge');

      if (totalItems > 0) {
        headerBadge.textContent = totalItems;
        headerBadge.style.display = 'flex';
        tabBadge.textContent = totalItems;
        tabBadge.style.display = 'flex';
      } else {
        headerBadge.style.display = 'none';
        tabBadge.style.display = 'none';
      }
    }


    // ──────────────────────────────────────────
    // F. ПОДЕЛИТЬСЯ
    // ──────────────────────────────────────────

    function shareProduct() {
      const url = window.location.href;

      // Пробуем через Telegram
      if (tg?.shareURL) {
        tg.shareURL(url, currentProduct?.название || 'Украшение Libe Libe Jewel');
        return;
      }

      // Пробуем через Web Share API (мобильные браузеры)
      if (navigator.share) {
        navigator.share({
          title: currentProduct?.название || 'Libe Libe Jewel',
          text:  'Посмотри это украшение 💎',
          url:   url
        });
        return;
      }

      // Запасной вариант — копируем в буфер обмена
      navigator.clipboard.writeText(url).then(() => {
        const btn = document.querySelector('.btn-secondary');
        const original = btn.textContent;
        btn.textContent = '✓ Ссылка скопирована';
        setTimeout(() => { btn.textContent = original; }, 2000);
      });
    }


    // ──────────────────────────────────────────
    // G. НАВИГАЦИЯ
    // ──────────────────────────────────────────

    function goBack()      { window.location.href = 'catalog.html'; }
    function goHome()      { window.location.href = 'index.html'; }
    function goToCatalog() { window.location.href = 'catalog.html'; }
    function goToCart()    { window.location.href = 'cart.html'; }
    function goToOrders()  { window.location.href = 'orders.html'; }

  </script>
